<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body{
            background:#0f172a;
            font-family:Arial;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            color:white;
        }
        .box{
            background:#1e293b;
            padding:40px;
            border-radius:12px;
            width:300px;
            text-align:center;
        }
        input{
            width:100%;
            padding:10px;
            margin:10px 0;
            border:none;
            border-radius:6px;
        }
        button{
            width:100%;
            padding:10px;
            background:#38bdf8;
            border:none;
            border-radius:6px;
            font-weight:bold;
        }
    </style>
</head>
<body>
<div class="box">
    <h2>Login</h2>

    {% if error %}
        <p style="color:red;">{{error}}</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
</div>
</body>
</html>
